<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riftbound Core Rules v1.1 - 日本語翻訳</title>
  <meta name="description" content="Riftbound Core Rules v1.1 の英語原文と日本語翻訳を並列表示。キーワード英語/日本語切替機能付き。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="site-title">
          <span class="title-icon">⚔️</span>
          Riftbound Core Rules v1.1
        </h1>
        <span class="subtitle">日本語翻訳</span>
        <nav class="header-nav">
          <a href="index.html" class="nav-link active">📖 ルールブック</a>
          <a href="cards/" class="nav-link">🃏 カードギャラリー</a>
          <a href="cards/glossary.html" class="nav-link">📚 用語集</a>
        </nav>
      </div>
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="メニュー">☰</button>
      <div class="mobile-menu-dropdown" id="mobile-menu-dropdown">
        <a href="index.html" class="mobile-menu-link active">📖 ルールブック</a>
        <a href="cards/" class="mobile-menu-link">🃏 カードギャラリー</a>
        <a href="cards/glossary.html" class="mobile-menu-link">📚 用語集</a>
      </div>
      <div class="header-controls">
        <div class="toggle-group">
          <label class="toggle-label" for="sync-toggle">同期スクロール:</label>
          <button id="sync-toggle" class="toggle-btn active" aria-label="同期スクロール切替">
            <span class="toggle-icon">🔗</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ナビゲーション -->
  <nav class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="メニュー切替">☰</button>
    <div class="sidebar-content">
      <h2 class="nav-title">目次</h2>
      <ul class="nav-list" id="nav-list">
        <!-- JavaScriptで動的に生成 -->
      </ul>
    </div>
  </nav>

  <!-- モバイル用タブバー（PC非表示） -->
  <div class="mobile-tab-bar" id="mobile-tab-bar">
    <button class="mobile-tab active" data-target="ja">🇯🇵 日本語翻訳</button>
    <button class="mobile-tab" data-target="en">🇬🇧 英語原文</button>
  </div>

  <!-- メインコンテンツ -->
  <main class="main-content" id="main-content">
    <div class="content-wrapper">
      <!-- 左カラム: 英語原文 -->
      <div class="column column-en" id="column-en">
        <div class="column-header">
          <h2>🇬🇧 Original (English)</h2>
        </div>
        <div class="column-body" id="content-en">
          <!-- 動的に生成 -->
        </div>
      </div>

      <!-- 右カラム: 日本語翻訳 -->
      <div class="column column-ja" id="column-ja">
        <div class="column-header">
          <h2>🇯🇵 翻訳 (日本語)</h2>
        </div>
        <div class="column-body" id="content-ja">
          <!-- 動的に生成 -->
        </div>
      </div>
    </div>
  </main>

  <!-- ページトップへ戻るボタン -->
  <button class="back-to-top" id="back-to-top" aria-label="ページトップへ">↑</button>

  <!-- ローディング -->
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <p>翻訳データを読み込み中...</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
